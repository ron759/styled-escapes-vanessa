<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading… · Styled Escapes by Vanessa</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:       #C8852A;
  --gold-lt:    #F5DFA8;
  --coral:      #C4503A;
  --coral-lt:   #F2A88A;
  --rose:       #C4607A;
  --teal:       #1A5C50;
  --ink:        #1C1A18;
  --ink-muted:  #6B5E54;
  --cream:      #FBF7F0;
  --cream-2:    #F5EEE2;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(13,24,37,0.92);
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06);
}
.nav-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  color: #FBF7F0;
  letter-spacing: 0.04em;
  text-decoration: none;
}
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a {
  font-size: 13px;
  color: rgba(251,247,240,0.8);
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 0.15s;
}
.nav-links a:hover { color: var(--gold-lt); }
.nav-cta {
  font-size: 12px !important;
  background: var(--coral) !important;
  color: #FBF7F0 !important;
  padding: 8px 20px;
  border-radius: 24px;
  letter-spacing: 0.06em !important;
}
.nav-cta:hover { background: #D4604A !important; }

/* ── HERO ── */
.post-hero {
  padding-top: 90px;
  position: relative;
  overflow: hidden;
  min-height: 460px;
  display: flex;
  align-items: flex-end;
  background: #0A1520;
}
.post-hero-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.45;
}
.post-hero-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,21,32,0.95) 0%, rgba(10,21,32,0.4) 50%, rgba(10,21,32,0.2) 100%);
}
.post-hero-content {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  padding: 60px 48px;
}
.post-hero-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.post-hero-tag {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-lt);
  background: rgba(200,133,42,0.2);
  padding: 4px 10px;
  border-radius: 12px;
}
.post-hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 400;
  color: #FBF7F0;
  line-height: 1.15;
  margin-bottom: 20px;
}
.post-hero-title em { font-style: italic; color: var(--coral-lt); }
.post-meta {
  font-size: 13px;
  color: rgba(251,247,240,0.55);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.post-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; }

/* ── ARTICLE LAYOUT ── */
.post-layout {
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 48px 100px;
}

/* ── BODY CONTENT ── */
.post-body { font-size: 17px; line-height: 1.8; color: #2A2624; }
.post-body p { margin-bottom: 1.5em; }
.post-body h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 500;
  color: var(--ink);
  margin: 2em 0 0.6em;
  line-height: 1.25;
}
.post-body h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 500;
  color: var(--ink);
  margin: 1.6em 0 0.5em;
}
.post-body ul, .post-body ol {
  padding-left: 1.6em;
  margin-bottom: 1.5em;
}
.post-body li { margin-bottom: 0.5em; }
.post-body strong { font-weight: 500; color: var(--ink); }
.post-body em { font-style: italic; }
.post-body a { color: var(--coral); text-decoration: none; border-bottom: 1px solid rgba(196,80,58,0.3); }
.post-body a:hover { border-color: var(--coral); }
.post-body blockquote {
  margin: 2em 0;
  padding: 24px 32px;
  background: var(--cream-2);
  border-left: 4px solid var(--coral);
  border-radius: 0 8px 8px 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--ink);
  line-height: 1.5;
}
.post-body img {
  width: 100%;
  border-radius: 10px;
  margin: 2em 0;
  display: block;
}
.post-body hr {
  border: none;
  border-top: 1px solid rgba(28,26,24,0.12);
  margin: 2.5em 0;
}

/* ── CTA CARD ── */
.post-cta {
  margin-top: 56px;
  padding: 40px 44px;
  background: linear-gradient(135deg, #1A3A4A 0%, #0F2030 100%);
  border-radius: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.post-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 120%, rgba(200,133,42,0.2) 0%, transparent 70%);
}
.post-cta-eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-lt);
  margin-bottom: 12px;
  position: relative;
}
.post-cta h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  color: #FBF7F0;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 12px;
  position: relative;
}
.post-cta h3 em { font-style: italic; color: var(--coral-lt); }
.post-cta p {
  font-size: 15px;
  color: rgba(251,247,240,0.65);
  margin-bottom: 28px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  position: relative;
}
.post-cta a {
  display: inline-block;
  padding: 14px 36px;
  background: var(--coral);
  color: #FBF7F0;
  border-radius: 32px;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-decoration: none;
  transition: background 0.15s;
  position: relative;
}
.post-cta a:hover { background: #D4604A; }

/* ── BACK LINK ── */
.post-back {
  margin-bottom: 36px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  text-decoration: none;
  transition: color 0.15s;
}
.post-back:hover { color: var(--coral); }
.post-back::before { content: '←'; }

/* ── LOADING / ERROR ── */
.post-state {
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 48px;
}
.post-state-inner { }
.spinner {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 2px solid rgba(196,80,58,0.2);
  border-top-color: var(--coral);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
footer {
  background: #0D1820;
  padding: 60px 48px 28px;
  color: rgba(251,247,240,0.7);
}
.footer-inner { max-width: 1160px; margin: 0 auto; }
.footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #FBF7F0; margin-bottom: 8px; }
.footer-tag { font-size: 13px; margin-bottom: 28px; max-width: 400px; line-height: 1.6; }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: 40px; padding-top: 20px;
  font-size: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
}
.footer-bottom a { color: rgba(251,247,240,0.5); text-decoration: none; }
.footer-bottom a:hover { color: var(--gold-lt); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  .nav-links { display: none; }
  .post-hero-content { padding: 40px 24px; }
  .post-layout { padding: 40px 24px 72px; }
  .post-cta { padding: 32px 24px; }
  footer { padding: 48px 24px 24px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="/">Styled Escapes by Vanessa</a>
  <div class="nav-links">
    <a href="/#destinations">Destinations</a>
    <a href="/#about">About</a>
    <a href="/blog">Blog</a>
    <a href="/#resources">Guides</a>
    <a href="/#plan" class="nav-cta">Plan My Trip</a>
  </div>
</nav>

<!-- HERO (populated by JS) -->
<div id="postHero" class="post-state">
  <div class="post-state-inner">
    <div class="spinner"></div>
    <p style="color:var(--ink-muted);font-size:14px">Loading post…</p>
  </div>
</div>

<!-- BODY (populated by JS) -->
<div id="postLayout"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">Styled Escapes by Vanessa</div>
    <p class="footer-tag">Abundant Travel by Dream Vacations certified travel consultant · Portland, TN · Serving clients nationwide.</p>
    <div class="footer-bottom">
      <span>&copy; <script>document.write(new Date().getFullYear())</script> Styled Escapes by Vanessa. All rights reserved.</span>
      <span><a href="https://vjacobs.dreamvacations.com" target="_blank">Dream Vacations Partner</a></span>
    </div>
  </div>
</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SANITY_PROJECT_ID = 'yw9842i2';
const SANITY_DATASET    = 'production';
const SANITY_API_URL    = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${SANITY_DATASET}`;

// ── GET SLUG FROM URL ────────────────────────────────────────────
const slug = new URLSearchParams(window.location.search).get('slug') || '';

if (!slug) {
  showError('No post specified.', true);
} else {
  loadPost(slug);
}

// ── FETCH ───────────────────────────────────────────────────────
async function loadPost(slug) {
  const query = encodeURIComponent(`*[_type == "post" && slug.current == "${slug}"][0] {
    _id,
    title,
    slug,
    publishedAt,
    excerpt,
    body,
    "tags": tags[]->{ title, slug },
    "coverImage": mainImage.asset->url,
    "coverImageAlt": mainImage.alt,
    "readTime": round(length(pt::text(body)) / 200)
  }`);

  try {
    const res  = await fetch(`${SANITY_API_URL}?query=${query}`);
    const data = await res.json();
    const post = data.result;
    if (!post) { showError('Post not found.', true); return; }
    renderPost(post);
  } catch (err) {
    showError('Couldn\'t load this post. Please try again.', false);
  }
}

// ── RENDER ──────────────────────────────────────────────────────
function renderPost(post) {
  // Update page title
  document.title = `${post.title} · Styled Escapes by Vanessa`;

  // Meta
  const date   = post.publishedAt ? new Date(post.publishedAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';
  const read   = post.readTime ? `${post.readTime} min read` : '';
  const tags   = (post.tags || []).map(t => `<span class="post-hero-tag">${esc(t.title)}</span>`).join('');

  // Hero
  const heroEl = document.getElementById('postHero');
  heroEl.className = 'post-hero';
  heroEl.innerHTML = `
    ${post.coverImage ? `<img class="post-hero-img" src="${post.coverImage}?w=1200&auto=format" alt="${esc(post.coverImageAlt || post.title)}">` : ''}
    <div class="post-hero-gradient"></div>
    <div class="post-hero-content">
      ${tags ? `<div class="post-hero-tags">${tags}</div>` : ''}
      <h1 class="post-hero-title">${esc(post.title)}</h1>
      <div class="post-meta">
        <span>By Vanessa Jacobs</span>
        ${date ? `<span class="post-meta-dot"></span><span>${date}</span>` : ''}
        ${read ? `<span class="post-meta-dot"></span><span>${read}</span>` : ''}
      </div>
    </div>`;

  // Body
  const bodyHtml = renderPortableText(post.body || []);

  document.getElementById('postLayout').innerHTML = `
    <div class="post-layout">
      <a class="post-back" href="/blog">Back to Blog</a>
      <div class="post-body">${bodyHtml}</div>
      <div class="post-cta">
        <div class="post-cta-eyebrow">Ready for your own adventure?</div>
        <h3>Let's plan your <em>dream trip</em></h3>
        <p>Vanessa handles every detail — for free. No fees, ever on cruises and all-inclusives.</p>
        <a href="/#plan">Start Planning</a>
      </div>
    </div>`;
}

// ── PORTABLE TEXT RENDERER ───────────────────────────────────────
// Lightweight renderer — handles the most common block types from Sanity.
function renderPortableText(blocks) {
  if (!blocks || !blocks.length) return '<p>No content.</p>';

  return blocks.map(block => {
    // Image blocks
    if (block._type === 'image' && block.asset) {
      const url = block.asset._ref
        ? refToUrl(block.asset._ref)
        : block.asset.url || '';
      return url ? `<img src="${url}?w=800&auto=format" alt="${esc(block.alt || '')}" loading="lazy">` : '';
    }

    // Portable text blocks
    if (block._type !== 'block') return '';

    const text = (block.children || []).map(span => {
      let s = esc(span.text || '');
      if (!s) return '';
      // Apply marks
      (span.marks || []).forEach(mark => {
        if (mark === 'strong') s = `<strong>${s}</strong>`;
        else if (mark === 'em') s = `<em>${s}</em>`;
        else if (mark === 'underline') s = `<u>${s}</u>`;
        else if (mark === 'code') s = `<code>${s}</code>`;
        else {
          // Could be a link annotation key — look up in markDefs
          const def = (block.markDefs || []).find(d => d._key === mark);
          if (def && def._type === 'link') s = `<a href="${esc(def.href || '#')}">${s}</a>`;
        }
      });
      return s;
    }).join('');

    switch (block.style) {
      case 'h1': return `<h2>${text}</h2>`;
      case 'h2': return `<h2>${text}</h2>`;
      case 'h3': return `<h3>${text}</h3>`;
      case 'h4': return `<h3>${text}</h3>`;
      case 'blockquote': return `<blockquote>${text}</blockquote>`;
      case 'normal':
      default: return text ? `<p>${text}</p>` : '';
    }
  }).join('\n');
}

function refToUrl(ref) {
  // Convert Sanity image ref like image-abc123-800x600-jpg to CDN URL
  const [, id, dims, fmt] = ref.replace('image-', '').split('-');
  return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${id}-${dims}.${fmt}`;
}

// ── ERROR STATE ─────────────────────────────────────────────────
function showError(msg, showBackLink) {
  document.getElementById('postHero').innerHTML = `
    <div class="post-state-inner">
      <p style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--ink);margin-bottom:12px">${msg}</p>
      ${showBackLink ? '<a href="/blog" style="color:var(--coral);font-size:14px">← Back to Blog</a>' : ''}
    </div>`;
  document.getElementById('postHero').className = 'post-state';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
