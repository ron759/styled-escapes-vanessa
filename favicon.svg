<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm sunset background circle -->
  <circle cx="32" cy="32" r="32" fill="#1A2E44"/>
  <!-- Upper wings -->
  <ellipse cx="18" cy="26" rx="14" ry="16" fill="#C8852A" opacity="0.95" transform="rotate(-20 18 26)"/>
  <ellipse cx="46" cy="26" rx="14" ry="16" fill="#C4503A" opacity="0.95" transform="rotate(20 46 26)"/>
  <!-- Lower wings -->
  <ellipse cx="16" cy="42" rx="10" ry="9" fill="#C4607A" opacity="0.85" transform="rotate(15 16 42)"/>
  <ellipse cx="48" cy="42" rx="10" ry="9" fill="#C4607A" opacity="0.85" transform="rotate(-15 48 42)"/>
  <!-- Wing shimmer highlights -->
  <ellipse cx="14" cy="22" rx="5" ry="7" fill="#F5DFA8" opacity="0.25" transform="rotate(-20 14 22)"/>
  <ellipse cx="50" cy="22" rx="5" ry="7" fill="#F5DFA8" opacity="0.25" transform="rotate(20 50 22)"/>
  <!-- Body -->
  <ellipse cx="32" cy="34" rx="2.5" ry="14" fill="#2A1A08"/>
  <!-- Antennae -->
  <line x1="30" y1="22" x2="22" y2="12" stroke="#2A1A08" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="22" x2="42" y2="12" stroke="#2A1A08" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="12" r="2" fill="#C8852A"/>
  <circle cx="42" cy="12" r="2" fill="#C8852A"/>
</svg>
