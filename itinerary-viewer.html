<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Travel Itinerary · Styled Escapes by Vanessa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ocean:      #1A4A5C;
  --ocean-mid:  #2A6A82;
  --ocean-deep: #060F1C;
  --coral:      #C4503A;
  --gold:       #C8852A;
  --sand:       #F5F0E8;
  --sand-2:     #EDE7DC;
  --ink:        #1C1A18;
  --ink-mid:    #4A4640;
  --ink-muted:  #7A7068;
  --white:      #FEFDFB;
  --cream:      #FBF7F0;
  --radius:     14px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', Georgia, sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HERO ── */
.hero {
  background: linear-gradient(160deg, #0d1f2d 0%, #1A4A5C 45%, #7a3520 80%, #c4503a 100%);
  padding: 56px 24px 64px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 60%, rgba(200,133,42,0.18) 0%, transparent 60%),
              radial-gradient(ellipse at 75% 30%, rgba(196,80,58,0.15) 0%, transparent 55%);
  pointer-events: none;
}
.hero-butterfly {
  font-size: 28px;
  opacity: 0.7;
  margin-bottom: 16px;
  display: block;
  animation: floatButterfly 4s ease-in-out infinite;
}
@keyframes floatButterfly {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50%       { transform: translateY(-8px) rotate(3deg); }
}
.hero-eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.6);
  margin-bottom: 14px;
}
.hero-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(32px, 7vw, 52px);
  font-weight: 400;
  color: #F5F0E8;
  line-height: 1.15;
  margin-bottom: 8px;
}
.hero-title em { font-style: italic; color: #f0c080; }
.hero-dates {
  font-size: 15px;
  color: rgba(245,240,232,0.75);
  margin-top: 14px;
}
.hero-pill {
  display: inline-block;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 12px;
  color: rgba(245,240,232,0.85);
  margin-top: 16px;
  letter-spacing: 0.06em;
}

/* ── QUICK STATS ── */
.stats-bar {
  background: var(--ocean);
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0;
}
.stat-item {
  flex: 1;
  min-width: 120px;
  max-width: 180px;
  text-align: center;
  padding: 16px 12px;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.stat-item:last-child { border-right: none; }
.stat-val {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 500;
  color: #f0c080;
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.5);
  margin-top: 4px;
}

/* ── PAGE BODY ── */
.body-wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }

/* ── SECTION ── */
.section { margin-top: 36px; }
.section-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--sand-2);
}
.card {
  background: var(--white);
  border: 1px solid var(--sand-2);
  border-radius: var(--radius);
  padding: 20px 24px;
}

/* ── FLIGHTS ── */
.flight-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
}
.flight-row + .flight-row {
  border-top: 1px solid var(--sand-2);
}
.flight-icon {
  width: 34px; height: 34px;
  background: var(--ocean);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  color: white;
}
.flight-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 3px;
}
.flight-detail {
  font-size: 15px;
  color: var(--ink);
  line-height: 1.4;
}

/* ── ACCOMMODATION ── */
.accommodation-text {
  font-size: 15px;
  color: var(--ink);
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ── CONFIRMATION NUMBERS ── */
.confirmation-text {
  font-size: 14px;
  color: var(--ink-mid);
  line-height: 1.8;
  font-family: 'DM Mono', 'Courier New', monospace;
  white-space: pre-wrap;
}

/* ── DAY TIMELINE ── */
.timeline { position: relative; padding-left: 44px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: linear-gradient(to bottom, var(--ocean), var(--coral));
  border-radius: 2px;
}

.day-entry { position: relative; margin-bottom: 24px; }
.day-dot {
  position: absolute;
  left: -37px;
  top: 8px;
  width: 22px; height: 22px;
  background: var(--ocean);
  border: 3px solid var(--cream);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 600;
  color: white;
  z-index: 1;
}
.day-card {
  background: var(--white);
  border: 1px solid var(--sand-2);
  border-radius: var(--radius);
  overflow: hidden;
}
.day-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--sand);
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.day-card-top:hover { background: var(--sand-2); }
.day-card-date {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.day-card-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--ocean);
  flex: 1;
}
.day-toggle { font-size: 11px; color: var(--ink-muted); transition: transform 0.2s; }
.day-toggle.open { transform: rotate(180deg); }

.day-card-body { padding: 18px; display: none; border-top: 1px solid var(--sand-2); }
.day-card-body.open { display: block; }

.day-section { margin-bottom: 14px; }
.day-section:last-child { margin-bottom: 0; }
.day-section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 5px;
}
.day-section-text {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ── IMPORTANT NUMBERS ── */
.numbers-text {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.9;
  white-space: pre-wrap;
}

/* ── VANESSA'S NOTE ── */
.vanessa-note {
  background: linear-gradient(135deg, #fdf3e3 0%, #faeae7 100%);
  border: 1px solid rgba(200,133,42,0.2);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-top: 36px;
  position: relative;
}
.vanessa-note::before {
  content: '🦋';
  position: absolute;
  top: -12px; right: 20px;
  font-size: 22px;
}
.vanessa-note-label {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
  font-weight: 500;
}
.vanessa-note-text {
  font-size: 15px;
  color: var(--ink-mid);
  line-height: 1.8;
  white-space: pre-wrap;
}

/* ── VANESSA CONTACT FOOTER ── */
.contact-footer {
  background: var(--ocean-deep);
  padding: 40px 24px;
  margin-top: 48px;
  text-align: center;
}
.contact-footer-eyebrow {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.4);
  margin-bottom: 10px;
}
.contact-footer-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 24px;
  font-weight: 400;
  color: #F5F0E8;
  margin-bottom: 2px;
}
.contact-footer-biz {
  font-size: 13px;
  color: rgba(245,240,232,0.55);
  margin-bottom: 24px;
}
.contact-links {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}
.contact-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 8px 18px;
  color: rgba(245,240,232,0.85);
  text-decoration: none;
  font-size: 13px;
  transition: background 0.15s;
}
.contact-link:hover { background: rgba(255,255,255,0.14); }
.contact-footer-dv {
  font-size: 12px;
  color: rgba(245,240,232,0.3);
  margin-top: 20px;
}

/* ── LOADING / ERROR ── */
.loading-state, .error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  padding: 40px 24px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--sand-2);
  border-top-color: var(--ocean);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: var(--ink-muted); }
.error-icon { font-size: 40px; margin-bottom: 14px; }
.error-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--ocean); margin-bottom: 8px; }
.error-sub { font-size: 14px; color: var(--ink-muted); }

@media (max-width: 500px) {
  .hero { padding: 40px 20px 52px; }
  .body-wrap { padding: 0 16px 60px; }
  .stats-bar { gap: 0; }
  .stat-item { min-width: 90px; padding: 14px 8px; }
  .stat-val { font-size: 18px; }
  .timeline { padding-left: 36px; }
  .day-dot { left: -30px; }
}
</style>
</head>
<body>

<div id="appRoot">
  <div class="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">Loading your itinerary…</div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────
var GAS_URL      = 'YOUR_GAS_WEB_APP_URL';
var PROXY_SECRET = 'YOUR_PROXY_SECRET';

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var params      = new URLSearchParams(window.location.search);
  var itineraryId = params.get('id');

  if (!itineraryId) {
    renderError('No itinerary ID', 'This link doesn\'t include an itinerary ID. Please check the URL and try again.');
    return;
  }

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ secret: PROXY_SECRET, type: 'itinerary', action: 'getItinerary', itineraryId: itineraryId })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (!res.success || !res.itinerary) {
      renderError('Itinerary not found', 'We couldn\'t locate this itinerary. The link may be outdated or incorrect.');
      return;
    }
    renderItinerary(res.itinerary, res.days || [], res.clientName || '');
  })
  .catch(function() {
    renderError('Connection error', 'We had trouble loading your itinerary. Please check your connection and try again.');
  });
});

// ── Render ───────────────────────────────────────────────────────
function renderItinerary(it, days, clientName) {
  var nightCount = '';
  if (it.startDate && it.endDate) {
    var d1 = new Date(it.startDate), d2 = new Date(it.endDate);
    var nights = Math.round((d2 - d1) / 86400000);
    if (nights > 0) nightCount = nights + ' night' + (nights !== 1 ? 's' : '');
  }

  var html = '';

  // ── HERO ──
  html += '<div class="hero">';
  html += '<span class="hero-butterfly">🦋</span>';
  html += '<div class="hero-eyebrow">' + (clientName ? 'Your Itinerary · ' + esc(clientName) : 'Your Travel Itinerary') + '</div>';
  html += '<h1 class="hero-title">' + esc(it.title) + '</h1>';
  if (it.destination) {
    html += '<div class="hero-pill">✦ &nbsp;' + esc(it.destination) + '</div>';
  }
  if (it.startDate || it.endDate) {
    html += '<div class="hero-dates">' + formatDateRange(it.startDate, it.endDate) + '</div>';
  }
  html += '</div>';

  // ── STATS BAR ──
  var stats = [];
  if (nightCount) stats.push({ val: nightCount.split(' ')[0], lbl: 'nights' });
  if (it.travelers) {
    var trav = it.travelers.replace(/\d+\s*(adults?)/i, function(m,g) { return m; });
    stats.push({ val: it.travelers, lbl: 'travelers' });
  }
  if (it.tripType) stats.push({ val: it.tripType, lbl: 'trip type' });
  if (days.length > 0) stats.push({ val: days.length, lbl: 'days planned' });

  if (stats.length > 0) {
    html += '<div class="stats-bar">';
    stats.forEach(function(s) {
      html += '<div class="stat-item"><div class="stat-val">' + esc(String(s.val)) + '</div><div class="stat-lbl">' + s.lbl + '</div></div>';
    });
    html += '</div>';
  }

  // ── BODY ──
  html += '<div class="body-wrap">';

  // Flights
  if (it.flightOut || it.flightReturn) {
    html += '<div class="section">';
    html += '<div class="section-label">Flights</div>';
    html += '<div class="card">';
    if (it.flightOut) {
      html += '<div class="flight-row">';
      html += '<div class="flight-icon">🛫</div>';
      html += '<div><div class="flight-label">Outbound</div><div class="flight-detail">' + esc(it.flightOut) + '</div></div>';
      html += '</div>';
    }
    if (it.flightReturn) {
      html += '<div class="flight-row">';
      html += '<div class="flight-icon">🛬</div>';
      html += '<div><div class="flight-label">Return</div><div class="flight-detail">' + esc(it.flightReturn) + '</div></div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Accommodation
  if (it.accommodation) {
    html += '<div class="section">';
    html += '<div class="section-label">Accommodation</div>';
    html += '<div class="card"><div class="accommodation-text">' + esc(it.accommodation) + '</div></div>';
    html += '</div>';
  }

  // Confirmation Numbers
  if (it.confirmationNumbers) {
    html += '<div class="section">';
    html += '<div class="section-label">Confirmation Numbers</div>';
    html += '<div class="card"><div class="confirmation-text">' + esc(it.confirmationNumbers) + '</div></div>';
    html += '</div>';
  }

  // Day-by-Day
  if (days.length > 0) {
    html += '<div class="section">';
    html += '<div class="section-label">Day-by-Day</div>';
    html += '<div class="timeline">';
    days.forEach(function(d, i) {
      html += '<div class="day-entry">';
      html += '<div class="day-dot">' + d.dayNumber + '</div>';
      html += '<div class="day-card">';
      html += '<div class="day-card-top" onclick="toggleDay(' + i + ')">';
      if (d.date) html += '<div class="day-card-date">' + formatDate(d.date) + '</div>';
      html += '<div class="day-card-title">' + esc(d.title || 'Day ' + d.dayNumber) + '</div>';
      html += '<div class="day-toggle open" id="toggle-' + i + '">▼</div>';
      html += '</div>';
      html += '<div class="day-card-body open" id="daybody-' + i + '">';
      if (d.description) {
        html += '<div class="day-section">';
        html += '<div class="day-section-label">Activities &amp; Details</div>';
        html += '<div class="day-section-text">' + esc(d.description) + '</div>';
        html += '</div>';
      }
      if (d.meals) {
        html += '<div class="day-section">';
        html += '<div class="day-section-label">Meals &amp; Dining</div>';
        html += '<div class="day-section-text">' + esc(d.meals) + '</div>';
        html += '</div>';
      }
      if (d.notes) {
        html += '<div class="day-section">';
        html += '<div class="day-section-label">Notes</div>';
        html += '<div class="day-section-text">' + esc(d.notes) + '</div>';
        html += '</div>';
      }
      html += '</div></div></div>';
    });
    html += '</div></div>';
  }

  // Important Numbers
  if (it.importantNumbers) {
    html += '<div class="section">';
    html += '<div class="section-label">Important Numbers &amp; Info</div>';
    html += '<div class="card"><div class="numbers-text">' + esc(it.importantNumbers) + '</div></div>';
    html += '</div>';
  }

  // Vanessa's Note
  if (it.vanessaNotes) {
    html += '<div class="vanessa-note">';
    html += '<div class="vanessa-note-label">A note from Vanessa</div>';
    html += '<div class="vanessa-note-text">' + esc(it.vanessaNotes) + '</div>';
    html += '</div>';
  }

  html += '</div>';// /body-wrap

  // ── CONTACT FOOTER ──
  html += '<footer class="contact-footer">';
  html += '<div class="contact-footer-eyebrow">Your travel consultant</div>';
  html += '<div class="contact-footer-name">Vanessa Jacobs</div>';
  html += '<div class="contact-footer-biz">Styled Escapes by Vanessa &nbsp;·&nbsp; Dream Vacations</div>';
  html += '<div class="contact-links">';
  html += '<a href="mailto:vanessa@example.com" class="contact-link">✉️ vanessa@example.com</a>';
  html += '<a href="tel:+1-555-000-0000" class="contact-link">📞 (555) 000-0000</a>';
  html += '<a href="https://vjacobs.dreamvacations.com" target="_blank" class="contact-link">🌐 vjacobs.dreamvacations.com</a>';
  html += '<a href="https://facebook.com/styledescapesbyvanessa" target="_blank" class="contact-link">📘 Facebook</a>';
  html += '</div>';
  html += '<div class="contact-footer-dv">Itinerary prepared by Styled Escapes by Vanessa · Dream Vacations affiliate · Portland, TN</div>';
  html += '</footer>';

  document.getElementById('appRoot').innerHTML = html;
}

// ── Day toggle ───────────────────────────────────────────────────
function toggleDay(i) {
  var body    = document.getElementById('daybody-' + i);
  var toggle  = document.getElementById('toggle-' + i);
  if (!body) return;
  var isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (toggle) toggle.classList.toggle('open', !isOpen);
}

// ── Error state ──────────────────────────────────────────────────
function renderError(title, msg) {
  document.getElementById('appRoot').innerHTML =
    '<div class="error-state">' +
    '<div class="error-icon">✈️</div>' +
    '<div class="error-title">' + esc(title) + '</div>' +
    '<div class="error-sub">' + esc(msg) + '</div>' +
    '</div>';
}

// ── Helpers ──────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function formatDate(d) {
  if (!d) return '';
  var parts = d.split('-');
  if (parts.length !== 3) return d;
  var months = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  return days[dt.getDay()] + ', ' + months[dt.getMonth()] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
}

function formatDateRange(start, end) {
  if (!start && !end) return '';
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmt(d) {
    if (!d) return '';
    var p = d.split('-');
    if (p.length !== 3) return d;
    return months[parseInt(p[1])-1] + ' ' + parseInt(p[2]) + ', ' + p[0];
  }
  if (start && end) return fmt(start) + ' – ' + fmt(end);
  return fmt(start) || fmt(end);
}
</script>
</body>
</html>
